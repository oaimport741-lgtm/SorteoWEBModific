<section id="formulario" class="cupon-section">
<h2>Participar</h2>

<form id="formularioDatos">
<div class="fila">
<input type="text" name="cedula" placeholder="Nro de cédula" autocomplete="off" inputmode="numeric" maxlength="10" aria-label="Número de cédula" required>
<input type="text" name="nombre" placeholder="Nombre" autocomplete="name" autocapitalize="characters" spellcheck="false" aria-label="Nombre" required>
<input type="tel" name="telefono" placeholder="09XX-XXX-XXX" autocomplete="tel" inputmode="numeric" maxlength="12" aria-label="Número de teléfono" required>
</div>

<div class="fila">
<input type="text" name="factura" placeholder="Ingresa los últimos 7 dígitos del Nro de tu factura" autocomplete="off" inputmode="numeric" maxlength="7" aria-label="Últimos 7 dígitos del número de factura" required>
<input type="text" name="local_compra" placeholder="Local" autocomplete="organization" autocapitalize="characters" spellcheck="false" aria-label="Nombre del local donde realizó la compra" required>
</div>

<div class="fila" id="codigos"></div>

<div class="botones">
<button type="button" id="agregarCodigo">Agregar otro código</button>
<button type="submit">Enviar</button>
</div>
</form>

<div id="loader" class="loader" aria-hidden="true"></div>
<p id="mensaje" class="mensaje" aria-live="polite"></p>
</section>

<section class="final-banner-section" aria-label="Productos participantes de la promoción">
<img src="WEB%20PROMO_BANER%20FINAL.png" class="final-banner" alt="Productos participantes de la promoción">

<div id="successModal" class="success-modal" hidden aria-hidden="true" role="dialog" aria-modal="true" aria-label="Notificación de registro exitoso">
<div class="success-modal__dialog">
<button type="button" id="successModalClose" class="success-modal__close" aria-label="Cerrar notificación">x</button>
<img src="notificacion-exito.svg" class="success-modal__image" alt="Registro enviado correctamente">
</div>
