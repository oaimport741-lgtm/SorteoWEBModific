<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-labelledby="title desc">
  <title id="title">Registro enviado correctamente</title>
  <desc id="desc">Imagen cuadrada de confirmacion del sorteo de OA Import.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff9f6"/>
      <stop offset="100%" stop-color="#f4e8e1"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d91f26"/>
      <stop offset="100%" stop-color="#a51419"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#311c1d" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1080" height="1080" rx="120" fill="url(#bg)"/>
  <rect x="54" y="54" width="972" height="972" rx="92" fill="none" stroke="#ffffff" stroke-opacity="0.72" stroke-width="16"/>

  <g opacity="0.12">
    <circle cx="170" cy="176" r="72" fill="#d91f26"/>
    <circle cx="918" cy="184" r="44" fill="#b79234"/>
    <circle cx="886" cy="862" r="96" fill="#d91f26"/>
    <circle cx="208" cy="840" r="56" fill="#b79234"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="200" y="140" width="680" height="810" rx="54" fill="#ffffff"/>
  </g>

  <g transform="translate(290 188)">
    <rect x="0" y="0" width="500" height="138" rx="34" fill="#fff4ef"/>
    <text x="250" y="58" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="42" font-weight="800" fill="#d91f26">OA IMPORT S.A.</text>
    <text x="250" y="102" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="26" font-weight="600" fill="#645d60">Sorteo oficial</text>
  </g>

  <g transform="translate(340 380)">
    <circle cx="200" cy="160" r="148" fill="none" stroke="url(#ring)" stroke-width="30"/>
    <circle cx="200" cy="160" r="112" fill="#fff6f1"/>
    <path d="M135 163l48 48 92-110" fill="none" stroke="#d91f26" stroke-linecap="round" stroke-linejoin="round" stroke-width="28"/>
  </g>

  <text x="540" y="748" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="74" font-weight="800" fill="#262225">Registro enviado</text>
  <text x="540" y="816" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="34" font-weight="500" fill="#645d60">Tus datos fueron cargados correctamente.</text>
  <text x="540" y="872" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="30" font-weight="600" fill="#b79234">Gracias por participar</text>
</svg>
